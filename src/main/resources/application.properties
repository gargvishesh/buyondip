spring.application.name=buyondip

# Database — configured via environment variables
# Supports both Railway (PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD) and manual JDBC URL
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

# JPA
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server — Railway injects $PORT dynamically; fallback to 8080 locally
server.port=${PORT:8080}

# Cache
spring.cache.type=simple

# Logging
logging.level.com.buyondip=INFO
logging.level.org.hibernate.SQL=WARN
